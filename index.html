<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cozy Island Game 🏝️</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #2c1810;
            font-family: 'Courier New', monospace;
        }
        #game-container {
            position: relative;
            width: 1280px;
            height: 768px;
            max-width: 100vw;
            max-height: calc(100vw * 384 / 640);
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
        #game-container canvas {
            width: 100% !important;
            height: 100% !important;
            display: block !important;
        }
        @media (max-width: 1280px) {
            #game-container {
                width: 100vw;
                height: calc(100vw * 384 / 640);
            }
        }
    </style>
</head>
<body>
    <div id="game-container"></div>
    <!-- Core game -->
    <script src="src/engine.js?v=20260702"></script>
    <script src="src/game.js?v=20260702"></script>
    <!-- Daycycle system -->
    <script src="src/daycycle.js?v=20260702"></script>
    <!-- UI helpers -->
    <script src="src/ui.js?v=20260702"></script>
    <!-- Gameplay systems -->
    <script src="src/crafting.js?v=20260702"></script>
    <script src="src/gardening.js?v=20260702"></script>
    <script src="src/gettin.js?v=20260702"></script>
    <!-- Social systems -->
    <script src="src/entities.js?v=20260702"></script>
    <script src="src/animals.js?v=20260702"></script>
    <script src="src/dialogue_written.js?v=20260702"></script>
    <script src="src/dialogue.js?v=20260702"></script>
    <script src="src/magic.js?v=20260702"></script>
    <!-- Misc systems -->
    <script src="src/save.js?v=20260702"></script>
    <script src="src/audio.js?v=20260702"></script>
    <script src="src/hog.js?v=20260702"></script>
    <script src="src/games.js?v=20260702"></script>
</body>
</html>
