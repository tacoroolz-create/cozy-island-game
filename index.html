<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cozy Island Game 🏝️</title>
    <!--
      Global error logging. Registered FIRST so it catches errors thrown while any
      later <script> (engine.js, game.js, dialogue.js, ...) is loading — exactly the
      kind of failure that otherwise shows up as a silent blank screen.

      Where the output lands:
        1. The browser DevTools Console (open with F12 / Cmd-Opt-J) — full message + stack.
        2. A red banner overlaid on the page itself, so a blank screen still tells you
           what broke without needing to open DevTools.
    -->
    <script>
    (function () {
        function showBanner(text) {
            var box = document.getElementById('error-banner');
            if (!box) {
                box = document.createElement('div');
                box.id = 'error-banner';
                box.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:99999;' +
                    'background:#b00020;color:#fff;font:12px/1.4 monospace;padding:8px 12px;' +
                    'white-space:pre-wrap;max-height:50vh;overflow:auto;box-shadow:0 2px 6px rgba(0,0,0,.4)';
                (document.body || document.documentElement).appendChild(box);
            }
            box.textContent = '⚠ Game error (see console for full details):\n' + text;
        }
        window.addEventListener('error', function (e) {
            var where = (e.filename || '?') + ':' + (e.lineno || '?') + ':' + (e.colno || '?');
            var msg = (e.message || 'Unknown error') + '\n  at ' + where;
            console.error('[GAME ERROR]', e.message, 'at', where, e.error || '');
            showBanner(msg);
        });
        window.addEventListener('unhandledrejection', function (e) {
            var reason = (e.reason && (e.reason.stack || e.reason.message)) || String(e.reason);
            console.error('[GAME ERROR] Unhandled promise rejection:', reason);
            showBanner('Unhandled promise rejection:\n' + reason);
        });
    })();
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
    <!-- Pixel font for the conversation box (DIALOGUE_FONT in dialogue.js). Swap
         "Silkscreen" for another Google pixel font (e.g. Pixelify+Sans, Press+Start+2P)
         by editing both this URL and the family name in dialogue.js. -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&family=Silkscreen:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #2c1810;
            font-family: 'Courier New', monospace;
        }
        #game-container {
            position: relative;
            width: 1280px;
            height: 768px;
            max-width: 100vw;
            max-height: calc(100vw * 384 / 640);
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
        #game-container canvas {
            width: 100% !important;
            height: 100% !important;
            display: block !important;
        }
        @media (max-width: 1280px) {
            #game-container {
                width: 100vw;
                height: calc(100vw * 384 / 640);
            }
        }
    </style>
</head>
<body>
    <div id="game-container"></div>
    <!-- Game scripts, loaded in dependency order with a per-page-load cache
         buster (same idea as DEV_REFRESH_ASSETS for sprites in game.js), so a
         plain refresh always fetches the latest code — no manual ?v= bumps. -->
    <script>
    (function () {
        var v = Date.now();
        [
            // Core game
            'src/engine.js',
            'src/game.js',
            // Daycycle system
            'src/daycycle.js',
            // UI helpers
            'src/ui.js',
            // Gameplay systems
            'src/crafting.js',
            'src/gardening.js',
            'src/gettin.js',
            // Social systems
            'src/entities.js',
            'src/animals.js',
            'src/dialogue_written.js',
            'src/dialogue_seasonal_extra.js',
            'src/dialogue_smalltalk.js',
            'src/dialogue.js',
            'src/magic.js',
            // Misc systems
            'src/save.js',
            // Neighbor quests + cardboard cutouts (needs ITEMS, NPC_DEFS, registerNewDay)
            'src/quests.js',
            // Recycle Bin sell counter (needs ITEMS, inventory, openMagicMenu)
            'src/recycle.js',
            // Stimmy Tim's cafe: interior fit-out + coffee/donut shop
            'src/cafe.js',
            // The Black Goddess: club fit-out + dance-off prize
            'src/club.js',
            'src/audio.js',
            'src/hog.js',
            'src/hog_chat.js',
            'src/games.js',
            // Dreamers Almanac (needs crafting.js drawNavRow + entities/daycycle data)
            'src/almanac.js'
        ].forEach(function (src) {
            document.write('<script src="' + src + '?v=' + v + '"><\/script>');
        });
    })();
    </script>
</body>
</html>
