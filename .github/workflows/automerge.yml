# Merge every PR into main the moment it opens (drafts get auto-readied).
# Escape hatch: title the PR starting with "WIP" to skip the merge.
name: Auto-merge PRs
on:
  pull_request:
    types: [opened, reopened, ready_for_review]

permissions:
  contents: write
  pull-requests: write

jobs:
  merge:
    if: ${{ !startsWith(github.event.pull_request.title, 'WIP') }}
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      PR: ${{ github.event.pull_request.number }}
      GH_REPO: ${{ github.repository }}
    steps:
      - run: gh pr ready "$PR" || true
      - run: gh pr merge "$PR" --merge
